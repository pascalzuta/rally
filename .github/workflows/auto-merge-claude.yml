name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "Creating PR from $BRANCH to main..."

          PR_URL=$(gh pr create \
            --title "Auto-merge: ${BRANCH}" \
            --body "Automated merge from Claude Code session." \
            --base main \
            --head "$BRANCH" 2>&1 || true)

          # If PR already exists, find it
          if echo "$PR_URL" | grep -q "already exists"; then
            PR_URL=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')
          fi

          echo "PR: $PR_URL"

          # Merge the PR
          gh pr merge "$BRANCH" --merge --auto || gh pr merge "$BRANCH" --merge
