name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Merge to main
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "Merging $BRANCH into main..."

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git merge "origin/$BRANCH" --no-edit -m "Auto-merge: ${BRANCH}"
          git push origin main

      - name: Trigger deploy workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Triggering deploy workflow..."
          gh workflow run deploy-pages.yml --ref main || echo "Could not dispatch deploy workflow"
