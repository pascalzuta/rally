<div style="max-width: 480px; margin: 0 auto; padding: 40px 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <!-- Logo -->
  <div style="text-align: center; margin-bottom: 32px;">
    <img src="https://play-rally.com/rally-logo.svg" alt="Rally" width="160" height="60" style="display: inline-block;" />
  </div>

  <!-- Welcome Message -->
  <div style="text-align: center; margin-bottom: 28px;">
    <h1 style="font-size: 22px; font-weight: 700; color: #111; margin: 0 0 8px 0;">Welcome to Rally</h1>
    <p style="font-size: 15px; color: #555; margin: 0;">Confirm your email to get started.</p>
  </div>

  <!-- Confirm Button -->
  <div style="text-align: center; margin-bottom: 32px;">
    <a href="{{ .ConfirmationURL }}" style="font-size: 15px; font-weight: 600; color: #fff; background: #111; text-decoration: none; padding: 14px 40px; border-radius: 10px; display: inline-block;">Confirm Email</a>
  </div>

  <!-- Divider -->
  <div style="border-top: 1px solid #eee; margin: 0 0 24px 0;"></div>

  <!-- Value Prop -->
  <div style="text-align: center; margin-bottom: 24px;">
    <p style="font-size: 13px; color: #888; margin: 0 0 4px 0; font-weight: 500;">Local tennis tournaments. Auto-scheduled matches.</p>
    <p style="font-size: 13px; color: #888; margin: 0;">Join your county and start playing.</p>
  </div>

  <!-- Footer -->
  <div style="text-align: center;">
    <a href="https://play-rally.com" style="font-size: 11px; color: #bbb; text-decoration: none;">play-rally.com</a>
  </div>
</div>
