<div style="max-width: 480px; margin: 0 auto; padding: 40px 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <!-- Logo -->
  <div style="text-align: center; margin-bottom: 32px;">
    <img src="https://play-rally.com/rally-logo-dark.png" alt="Rally" width="160" height="50" style="display: inline-block;" />
  </div>

  <!-- OTP Code Section -->
  <div style="background: #fafafa; border-radius: 16px; padding: 32px 24px; text-align: center; margin-bottom: 24px;">
    <p style="font-size: 15px; color: #333; margin: 0 0 20px 0;">Your sign-in code</p>
    <div style="margin: 0 0 12px 0;">
      <span style="font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace; font-size: 36px; font-weight: 700; letter-spacing: 8px; color: #111; background: #fff; padding: 16px 28px; border-radius: 12px; display: inline-block; border: 1px solid #e5e5e5;">{{ .Token }}</span>
    </div>
    <p style="font-size: 12px; color: #999; margin: 0;">Expires in 10 minutes</p>
  </div>

  <!-- Magic Link Button -->
  <div style="text-align: center; margin-bottom: 32px;">
    <p style="font-size: 13px; color: #666; margin: 0 0 16px 0;">Or sign in with one tap:</p>
    <a href="{{ .ConfirmationURL }}" style="font-size: 15px; font-weight: 600; color: #fff; background: #111; text-decoration: none; padding: 14px 40px; border-radius: 10px; display: inline-block;">Sign In to Rally</a>
  </div>

  <!-- Divider -->
  <div style="border-top: 1px solid #eee; margin: 0 0 24px 0;"></div>

  <!-- Value Prop -->
  <div style="text-align: center; margin-bottom: 24px;">
    <p style="font-size: 13px; color: #888; margin: 0 0 4px 0; font-weight: 500;">Local tennis tournaments. Auto-scheduled matches.</p>
    <p style="font-size: 13px; color: #888; margin: 0;">Join your county and start playing.</p>
  </div>

  <!-- Footer -->
  <div style="text-align: center;">
    <a href="https://play-rally.com" style="font-size: 11px; color: #bbb; text-decoration: none;">play-rally.com</a>
  </div>
</div>
