    <!-- Bottom wing -->
    <path d="M0 8 Q12 14 28 16 Q20 8 32 2 L38 0" stroke="#111111" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center line / tail -->
