        <h1>Rally — Find Local Tennis Players & Tournaments Near You</h1>
        <p>Rally connects tennis players in your county for competitive round-robin tournaments. Join your local lobby, get auto-matched by skill level and availability, and play real matches — all for free.</p>

        <h2>How Rally Works</h2>
        <ol>
          <li><strong>Sign up and select your county</strong> — Choose from 3,000+ US counties to find players near you.</li>
          <li><strong>Join your county's lobby</strong> — See how many players are waiting and invite friends to fill the lobby faster.</li>
          <li><strong>Tournament auto-creates at 6+ players</strong> — Once enough players join, a round-robin tournament is automatically generated.</li>
          <li><strong>Smart scheduling</strong> — Matches are scheduled around everyone's availability using intelligent time-slot matching.</li>
          <li><strong>Play and climb the leaderboard</strong> — Report scores, earn Rally Rating points, and compete for your county's top spot.</li>
        </ol>

        <h2>Features</h2>
        <ul>
          <li>County-based matchmaking across all 50 US states</li>
          <li>Round-robin tournament format — play every opponent</li>
          <li>NTRP skill-level matching (2.0 to 5.0+)</li>
          <li>Availability-based smart scheduling</li>
          <li>ELO-based Rally Rating system</li>
          <li>Real-time brackets and leaderboards</li>
          <li>100% free — no fees, no subscriptions</li>
        </ul>

        <h2>Frequently Asked Questions</h2>

        <h3>What is Rally?</h3>
        <p>Rally is a free platform that connects local tennis players for competitive round-robin tournaments. Players join their county's lobby, and when enough players sign up (6+), a tournament is automatically created with matches scheduled around everyone's availability.</p>

        <h3>How does Rally match tennis players?</h3>
        <p>Rally groups players by county and skill level (NTRP ratings from 2.0 to 5.0+). When 6 or more players join a county lobby, the system automatically creates a round-robin tournament and schedules matches based on overlapping availability windows.</p>

        <h3>Is Rally free to use?</h3>
        <p>Yes, Rally is completely free. There are no subscription fees, tournament entry fees, or hidden costs. Simply sign up, join your county's lobby, and start playing.</p>

        <h3>What skill levels does Rally support?</h3>
        <p>Rally supports all skill levels using the NTRP (National Tennis Rating Program) scale from 2.0 (beginner) to 5.0+ (advanced/competitive). Players are matched with others at similar skill levels.</p>

        <h3>How many players are needed to start a tournament?</h3>
        <p>A minimum of 6 players are needed to start a round-robin tournament. Once your county lobby reaches 6+ players, the tournament is automatically created.</p>

        <h3>What is a round-robin tournament format?</h3>
        <p>In a round-robin tournament, every player plays against every other player in their group. This ensures maximum playing time and a fair ranking based on overall performance.</p>

        <h3>How does Rally scheduling work?</h3>
        <p>Rally uses smart scheduling that analyzes all players' availability to find overlapping 2-hour windows. Matches are categorized as auto-scheduled, needs-accept, or needs-negotiation.</p>

        <h3>What is Rally Rating?</h3>
        <p>Rally Rating is an ELO-based rating system that tracks your competitive performance over time. Your rating updates after each match based on the result and your opponent's rating.</p>

        <h3>What counties and areas does Rally cover?</h3>
        <p>Rally covers all 3,000+ counties across all 50 US states. Select your county during registration and connect with local tennis players.</p>

        <h3>Can I invite friends to Rally?</h3>
        <p>Yes! Share a direct invitation link with friends. When they click the link, they'll join your county's lobby directly.</p>

        <p>Visit the <a href="/blog/">Rally Blog</a> for expert articles on tennis technique, analytics, and strategy.</p>
